<!--
    COMMON CART HTML TEMPLATE
    Copy this structure to all menu_style files
    Replace existing cart HTML (floating cart, cart bar, cart section)
-->

<!-- Bottom Cart Bar -->
<div class="cart-bar" style="display: none;">
    <div class="cart-info">
        <span class="cart-items-count">0 Items</span>
        <span class="cart-total">₹0</span>
    </div>
    <button class="view-cart-btn">
        View Cart
        <i class="bi bi-arrow-right"></i>
    </button>
</div>

<!-- Cart Section (Bottom Sheet) -->
<div class="cart-overlay"></div>
<div class="cart-section">
    <div class="cart-header">
        <h3 class="cart-title">Your Cart</h3>
        <div class="cart-header-actions">
            <button class="cart-fullscreen-btn" title="Fullscreen">
                <i class="bi bi-arrows-fullscreen"></i>
            </button>
            <button class="cart-close-btn">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
    </div>
    <div class="cart-items-list">
        <!-- Cart items will be added here dynamically -->
    </div>
    <div class="cart-footer">
        <div class="cart-summary">
            <div class="summary-row">
                <span>Subtotal</span>
                <span class="subtotal-amount">₹0</span>
            </div>
            <div class="summary-row">
                <span>Delivery Fee</span>
                <span>₹40</span>
            </div>
            <div class="summary-row total">
                <span>Total</span>
                <span class="total-amount">₹40</span>
            </div>
        </div>
        <button class="checkout-btn">
            Proceed to Checkout
            <i class="bi bi-arrow-right"></i>
        </button>
    </div>
</div>
