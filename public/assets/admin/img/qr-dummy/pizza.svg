<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="20" fill="#FFF8E1"/>
  <!-- Pizza base circle -->
  <circle cx="100" cy="105" r="65" fill="#E8A04F"/>
  <circle cx="100" cy="105" r="60" fill="#F5C87A"/>
  <!-- Cheese layer -->
  <circle cx="100" cy="105" r="55" fill="#FFE082"/>
  <!-- Sauce spots -->
  <circle cx="80" cy="90" r="8" fill="#E53935" opacity="0.7"/>
  <circle cx="115" cy="80" r="7" fill="#E53935" opacity="0.6"/>
  <circle cx="95" cy="115" r="9" fill="#E53935" opacity="0.7"/>
  <circle cx="120" cy="110" r="6" fill="#E53935" opacity="0.6"/>
  <!-- Pepperoni -->
  <circle cx="75" cy="100" r="10" fill="#C62828"/>
  <circle cx="75" cy="100" r="7" fill="#D32F2F"/>
  <circle cx="110" cy="90" r="10" fill="#C62828"/>
  <circle cx="110" cy="90" r="7" fill="#D32F2F"/>
  <circle cx="100" cy="120" r="10" fill="#C62828"/>
  <circle cx="100" cy="120" r="7" fill="#D32F2F"/>
  <circle cx="130" cy="108" r="8" fill="#C62828"/>
  <circle cx="130" cy="108" r="5" fill="#D32F2F"/>
  <!-- Olive slices -->
  <circle cx="88" cy="82" r="6" fill="#37474F"/>
  <circle cx="88" cy="82" r="3" fill="#455A64"/>
  <circle cx="120" cy="125" r="6" fill="#37474F"/>
  <circle cx="120" cy="125" r="3" fill="#455A64"/>
  <!-- Basil leaves -->
  <ellipse cx="70" cy="115" rx="8" ry="5" fill="#2E7D32" transform="rotate(-30 70 115)"/>
  <ellipse cx="135" cy="95" rx="7" ry="4" fill="#2E7D32" transform="rotate(20 135 95)"/>
  <!-- Crust highlight -->
  <path d="M40 105 A65 65 0 0 1 100 40" fill="none" stroke="#D4893F" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
</svg>